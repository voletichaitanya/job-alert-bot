name: Job Alert Bot

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y chromium-browser

      - name: Run script
        run: python main.py

      - name: Commit jobs.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add jobs.json
          git commit -m "update jobs" || echo "no changes"
          git push
